version: "3.9"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt protocol
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: research_api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - neo4j
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - NEO4J_URI=bolt://neo4j:7687
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: research_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    restart: unless-stopped
  
  mcp_vector_store:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: research_mcp_vector_store
    command: uvicorn src.mcp.servers.vector_store_server:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    environment:
      - MCP_HOST=http://localhost:8001

  mcp_web_search:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: research_mcp_web_search
    command: uvicorn src.mcp.servers.web_search_server:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    depends_on:
      - ollama
    environment:
      - MCP_HOST=http://localhost:8002

volumes:
  ollama_data:
  neo4j_data:
